name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: |
          if find . -name "*.swift" -not -path "./.build/*" -not -path "./DerivedData/*" | head -1 | grep -q .; then
            swiftlint lint --strict --reporter github-actions-logging
          else
            echo "No Swift files yet — skipping lint."
          fi

  project-sync:
    name: Project sync (xcodegen)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Regenerate project
        run: |
          if [ -f "project.yml" ]; then
            xcodegen generate
          else
            echo "No project.yml yet — skipping."
          fi

      - name: Verify no drift
        run: |
          if [ -f "project.yml" ]; then
            if ! git diff --quiet -- '*.pbxproj' 'xcshareddata' '*Generated-Info.plist'; then
              echo "::error::project.yml and generated project files drifted. Run 'xcodegen generate' locally and commit the result."
              git --no-pager diff -- '*.pbxproj' 'xcshareddata' '*Generated-Info.plist'
              exit 1
            fi
            echo "Project files in sync with project.yml."
          fi

  build:
    name: Build & Test
    runs-on: macos-15
    needs: project-sync
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Pick the newest installed Xcode 16.x; falls back to default if none found.
          candidate=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$candidate" ]; then
            sudo xcode-select -s "$candidate"
          fi

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Build
        run: |
          if [ -f "StepBack.xcodeproj/project.pbxproj" ]; then
            set -o pipefail
            xcodebuild \
              -project StepBack.xcodeproj \
              -scheme StepBack \
              -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
              -configuration Debug \
              CODE_SIGNING_ALLOWED=NO \
              build-for-testing | xcbeautify
          else
            echo "No Xcode project yet — skipping build."
          fi

      - name: Test
        run: |
          if [ -f "StepBack.xcodeproj/project.pbxproj" ] && xcodebuild -project StepBack.xcodeproj -list 2>/dev/null | grep -q "StepBackTests"; then
            set -o pipefail
            xcodebuild \
              -project StepBack.xcodeproj \
              -scheme StepBack \
              -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
              -configuration Debug \
              CODE_SIGNING_ALLOWED=NO \
              test-without-building | xcbeautify
          else
            echo "No test target — skipping."
          fi
