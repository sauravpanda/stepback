disabled_rules:
  - todo
  - trailing_whitespace
  - line_length

opt_in_rules:
  - empty_count
  - empty_string
  - closure_spacing
  - explicit_init
  - first_where
  - force_unwrapping
  - implicit_return
  - prefer_zero_over_explicit_init
  - redundant_nil_coalescing
  - sorted_imports

analyzer_rules:
  - unused_import

excluded:
  - .build
  - DerivedData
  - build

identifier_name:
  min_length: 2
  excluded:
    - id
    - a
    - b
    - x
    - y
    - dx
    - dy
    - vm

type_name:
  min_length: 3
  max_length: 50

function_body_length:
  warning: 80
  error: 160

file_length:
  warning: 600
  error: 1000

cyclomatic_complexity:
  warning: 15
  error: 25

nesting:
  type_level: 3
